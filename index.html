<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약국 마케팅 칼럼 - 이지선</title>
    <style>
        :root { --primary-color: #2563eb; --secondary-color: #10b981; --text-color: #1f2937; --bg-color: #f9fafb; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.8; color: var(--text-color); background-color: var(--bg-color); margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { border-bottom: 2px solid #eee; margin-bottom: 40px; padding-bottom: 20px; }
        .category { color: var(--primary-color); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        h1 { font-size: 2.2rem; line-height: 1.3; margin: 10px 0; color: #111; word-break: keep-all; }
        .content { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { font-size: 1.5rem; color: var(--primary-color); margin-top: 40px; border-left: 4px solid var(--primary-color); padding-left: 15px; }
        p { margin-bottom: 20px; font-size: 1.1rem; color: #374151; text-align: justify; }
        
        /* CTA 버튼 스타일 */
        .cta-section { 
            margin-top: 50px; 
            padding: 30px; 
            background-color: #f8fafc; 
            border-radius: 12px; 
            text-align: center;
            border: 1px dashed #cbd5e1;
        }
        .cta-text { 
            font-size: 1.15rem; 
            font-weight: 600; 
            color: #334155; 
            margin-bottom: 20px; 
        }
        .cta-button { 
            display: inline-block; 
            padding: 16px 32px; 
            background-color: var(--primary-color); 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }
        .cta-button:hover { 
            background-color: #1d4ed8; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.3);
        }

        footer { text-align: center; margin-top: 50px; color: #9ca3af; font-size: 0.9rem; padding-bottom: 40px; }
    </style>
</head>
